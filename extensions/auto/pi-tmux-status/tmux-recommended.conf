# ============================================================
# pi-tmux-status 推荐 tmux 配置
# ============================================================
# 将需要的段落复制到 ~/.tmux.conf 中。
#
# 各段落标注了"必须"/"推荐"/"可选"，按需复制即可。
# ============================================================

# === 1. 窗格状态可视化（必须） ===

# 启用顶部边框栏
set -g pane-border-status top

# 边框栏格式：脚本输出 #[bg=colour,fg=colour] 为整个栏上色
set -g pane-border-format \
  '#( ~/.local/bin/tmux-pane-title #{pane_id}) | #{pane_current_command} | #P '

# 非活跃 pane 边框颜色（灰色细线）
set -g pane-border-style fg=colour240

# 活跃 pane 边框颜色（绿色，pi-tmux-status 运行时会动态覆盖）
set -g pane-active-border-style fg=colour82,bold

# 刷新频率（影响 #() 脚本调用间隔，单位秒）
set -g status-interval 5

# === 2. 扩展键支持（Pi 推荐） ===
# 使 Shift+Enter / Ctrl+Enter 能被 Pi 正确识别
set -g extended-keys on
set -g extended-keys-format csi-u

# === 3. 基础优化（推荐） ===
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000

# === 4. 状态栏配色（可选） ===
set -g status-style bg=colour235,fg=colour250
set -g window-status-current-style fg=colour82,bold
set -g status-right '#[fg=colour240]%H:%M #[fg=colour250]%Y-%m-%d'

# === 5. 系统剪贴板集成（推荐，macOS） ===
# Vim 模式复制 → 系统剪贴板
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
# 鼠标拖拽选择 → 自动复制
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# 中键粘贴
bind -n MouseDown2Pane if-shell "which pbpaste >/dev/null" {
  run-shell "tmux set-buffer -b pastebuffer \"$(pbpaste -Prefer txt)\""
  paste-buffer -b pastebuffer
}
