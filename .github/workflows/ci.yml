name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    # ── Formatting ──
    format:
        name: Prettier
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run format:check

    # ── Type checking (non-blocking — pi API version mismatch) ──
    typecheck:
        name: TypeScript
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run typecheck

    # ── Linting (non-blocking — 10 pre-existing errors in sub-packages) ──
    lint:
        name: ESLint
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run lint

    # ── SAST ──
    semgrep:
        name: Semgrep
        runs-on: ubuntu-latest
        container:
            image: semgrep/semgrep:latest
        steps:
            - uses: actions/checkout@v4
            - name: Semgrep ERROR (blocks merge)
              run: |
                  semgrep --config .semgrep.yml \
                    --exclude 'node_modules/**' \
                    --exclude '.pi/**' \
                    --exclude '.git/**' \
                    --metrics=off \
                    --no-git-ignore \
                    --error \
                    --severity ERROR
            - name: Semgrep WARNING (report only)
              if: always()
              run: |
                  semgrep --config .semgrep.yml \
                    --exclude 'node_modules/**' \
                    --exclude '.pi/**' \
                    --exclude '.git/**' \
                    --metrics=off \
                    --no-git-ignore \
                    --severity WARNING

    # ── E2E Tests (with mock LLM, no API key required) ──
    # 故意设为 continue-on-error: true（非阻塞参考测试），原因：
    # 1. ci-watch 等模块含 REVIEW 用例需人工衡量，CI 无法自动化判定
    # 2. run-e2e.sh 以 REVIEW 用例数退出（非纯 FAIL），基准状态不稳定
    # 3. 测试结果通过 artifact 上传，合并前供人工审阅
    # 若需改为阻塞模式，需先让所有模块的 REVIEW 用例归零
    e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - name: Install project dependencies
              run: npm ci
            - name: Install pi globally
              run: npm install -g @earendil-works/pi-coding-agent
            - name: Create node_modules link for @zenone/pi-logger
              run: |
                  PI_PKG=$(node -e "console.log(
                    require.resolve('@earendil-works/pi-coding-agent/package.json')
                  )")
                  PI_NM=$(dirname "$PI_PKG")/node_modules/@zenone
                  mkdir -p "$PI_NM"
                  ln -sf "$PWD/extensions/meta/pi-logger" \
                    "$PI_NM/pi-logger" 2>/dev/null || true
            - name: Prepare results directory
              run: mkdir -p test/results
            - name: Run Vitest tests
              env:
                  CI: true
              run: npm test
            - name: Run bash e2e tests
              env:
                  CI: true
              run: bash test/scripts/run-e2e.sh
            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-test-results
                  path: test/results/
            - name: Show summary
              if: always()
              run: |
                  LATEST=$(ls -1t test/results/ | head -1)
                  SF="test/results/$LATEST/summary.md"
                  cat "$SF" 2>/dev/null || echo "(no summary)"
